<div class="doc-wrap">

  <header class="doc-hdr">
    <div class="doc-hdr-left">
      <span class="doc-badge">{{ '📒' if topico.tipo == 'nota' else '🎯' if topico.tipo == 'tarefa' else '📒' }}</span>
      <h1 class="doc-titulo">{{ topico.nome }}</h1>
    </div>
    <span class="save-badge" id="saveBadge">—</span>
  </header>

  <div class="toolbar" id="toolbar">
    <button class="tb" data-cmd="bold"              title="Negrito (Ctrl+B)"><b>B</b></button>
    <button class="tb" data-cmd="italic"            title="Itálico (Ctrl+I)"><i>I</i></button>
    <button class="tb" data-cmd="underline"         title="Sublinhado (Ctrl+U)"><u>U</u></button>
    <button class="tb" data-cmd="strikeThrough"     title="Tachado"><s>S</s></button>
    <span class="tb-sep"></span>
    <button class="tb" data-cmd="formatBlock" data-val="h1" title="Título 1">H1</button>
    <button class="tb" data-cmd="formatBlock" data-val="h2" title="Título 2">H2</button>
    <button class="tb" data-cmd="formatBlock" data-val="h3" title="Título 3">H3</button>
    <button class="tb" data-cmd="formatBlock" data-val="p"  title="Parágrafo">¶</button>
    <span class="tb-sep"></span>
    <button class="tb" data-cmd="insertUnorderedList" title="Lista de itens">• —</button>
    <button class="tb" data-cmd="insertOrderedList"   title="Lista numerada">1. —</button>
    <span class="tb-sep"></span>
    <button class="tb" data-cmd="removeFormat" title="Limpar formatação">✕ fmt</button>
    <span class="tb-sep"></span>
    <button class="tb" id="btnInsertLink" title="Inserir link externo">🔗</button>
  </div>


  <div class="editor-area" id="editorArea"
       contenteditable="true"
       data-id="{{ topico.id }}"
       spellcheck="false">
    {% if conteudo and conteudo.conteudo %}
      {{ conteudo.conteudo | safe }}
    {% else %}
      <p><br></p>
    {% endif %}
  </div>

</div>

<style>
.doc-wrap{display:flex;flex-direction:column;height:100%;background:#fff;overflow:hidden}
.doc-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 24px 12px;border-bottom:1px solid #e2e8f0;flex-shrink:0;gap:12px}
.doc-hdr-left{display:flex;align-items:baseline;gap:10px;min-width:0}
.doc-badge{font-size:14px;flex-shrink:0}
.doc-titulo{font-size:20px;font-weight:700;color:#0f172a;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.save-badge{font-size:12px;color:#94a3b8;flex-shrink:0;transition:color 0.2s}
.save-badge.saving{color:#f59e0b}
.save-badge.saved{color:#22c55e}
.save-badge.error{color:#ef4444}
.toolbar{display:flex;align-items:center;gap:2px;padding:6px 16px;border-bottom:1px solid #e2e8f0;flex-shrink:0;flex-wrap:wrap;background:#f8fafc}
.tb{display:inline-flex;align-items:center;justify-content:center;min-width:30px;height:26px;padding:0 6px;background:transparent;border:1px solid transparent;border-radius:4px;cursor:pointer;font-size:12px;color:#374151;transition:all 0.1s;font-family:inherit}
.tb:hover{background:#e2e8f0;border-color:#cbd5e1}
.tb.active{background:#dbeafe;border-color:#93c5fd;color:#2563eb}
.tb-sep{width:1px;height:18px;background:#e2e8f0;margin:0 4px;flex-shrink:0}
.editor-area{flex:1;overflow-y:auto;padding:28px 48px;font-size:15px;line-height:1.85;color:#1e293b;outline:none;min-height:0}
.editor-area:focus{outline:none}
.editor-area h1{font-size:26px;font-weight:700;margin:0 0 14px;color:#0f172a}
.editor-area h2{font-size:20px;font-weight:600;margin:20px 0 10px;color:#1e293b}
.editor-area h3{font-size:16px;font-weight:600;margin:16px 0 8px;color:#374151}
.editor-area p{margin:0 0 10px}
.editor-area ul,.editor-area ol{padding-left:26px;margin:0 0 10px}
.editor-area li{margin-bottom:3px}
/* Nota links */
.nota-link{color:#2563eb;background:#eff6ff;border-radius:3px;padding:1px 5px;text-decoration:none;font-weight:500;cursor:pointer;border-bottom:1px solid #bfdbfe;transition:background 0.12s;white-space:nowrap}
.nota-link:hover{background:#dbeafe;border-bottom-color:#93c5fd}
/* Links externos */
.ext-link{color:#0f766e;background:#f0fdfa;border-radius:3px;padding:1px 5px;text-decoration:none;font-weight:500;cursor:pointer;border-bottom:1px solid #99f6e4;transition:background 0.12s}
.ext-link::after{content:"↗";font-size:9px;margin-left:2px;opacity:.7}
.ext-link:hover{background:#ccfbf1;border-bottom-color:#2dd4bf}
/* Autocomplete popup */
#notaLinkPopup{position:fixed;z-index:9999;background:#fff;border:1px solid #dbe4ef;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.14);min-width:210px;max-width:340px;overflow:hidden;font-size:13px}
/* Image resize */
.editor-area img{cursor:pointer;max-width:100%}
.editor-area img.img-sel{outline:2px solid #3b82f6;outline-offset:1px}
#imgResizeBox{position:fixed;border:1.5px solid #3b82f6;pointer-events:none;z-index:9000;display:none;box-sizing:border-box}
.img-rh{position:absolute;width:10px;height:10px;background:#3b82f6;border:2px solid #fff;border-radius:2px;pointer-events:all;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.img-rh[data-h=nw]{top:-5px;left:-5px;cursor:nw-resize}
.img-rh[data-h=ne]{top:-5px;right:-5px;cursor:ne-resize}
.img-rh[data-h=sw]{bottom:-5px;left:-5px;cursor:sw-resize}
.img-rh[data-h=se]{bottom:-5px;right:-5px;cursor:se-resize}
.img-rh-lbl{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;font-size:10px;padding:1px 5px;border-radius:3px;white-space:nowrap;pointer-events:none;opacity:.85}
.nlp-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;color:#1e293b;transition:background 0.1s}
.nlp-item:hover,.nlp-item.sel{background:#eff6ff;color:#2563eb}
.nlp-empty{padding:10px 12px;color:#94a3b8;font-size:13px}
.nlp-hint{padding:4px 12px 6px;font-size:11px;color:#cbd5e1;border-top:1px solid #f1f5f9}
@media(max-width:640px){.editor-area{padding:16px 18px}}
</style>

<script>
(function(){
  const area    = document.getElementById('editorArea');
  const badge   = document.getElementById('saveBadge');
  const toolbar = document.getElementById('toolbar');
  if (!area) return;

  const saveUrl = '/topico/' + area.dataset.id + '/salvar';
  let saveTimer, acTimer;
  let popup = null, acItems = [], acIdx = -1;
  let savedRange = null;

  const TIPO_ICONE = {nota:'📒',caderno:'📔',planilha:'📊',diagrama:'🔷',jupyter:'⚗️',tarefa:'🎯',imagem:'🖼'};

  /* ── Toolbar ── */
  toolbar.querySelectorAll('.tb[data-cmd]').forEach(btn => {
    btn.addEventListener('mousedown', e => {
      e.preventDefault();
      document.execCommand(btn.dataset.cmd, false, btn.dataset.val || null);
      area.focus();
    });
  });

  /* ── Inserir link externo ── */
  document.getElementById('btnInsertLink').addEventListener('mousedown', e => {
    e.preventDefault();
    const sel = window.getSelection();
    savedRange = sel?.rangeCount ? sel.getRangeAt(0).cloneRange() : null;
    const textoSel = savedRange && !savedRange.collapsed ? savedRange.toString() : '';

    const url = window.prompt('Cole ou digite a URL do link:');
    if (!url || !url.trim()) return;

    const href = url.trim();
    const text = textoSel || href;

    area.focus();
    const a = document.createElement('a');
    a.href = href;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.className = 'ext-link';
    a.contentEditable = 'false';
    a.textContent = text;

    const sel2 = window.getSelection();
    if (savedRange) {
      sel2.removeAllRanges();
      sel2.addRange(savedRange);
      savedRange.deleteContents();
      savedRange.insertNode(a);
      const nr = document.createRange();
      nr.setStartAfter(a); nr.collapse(true);
      sel2.removeAllRanges(); sel2.addRange(nr);
    } else {
      document.execCommand('insertHTML', false, a.outerHTML);
    }
    savedRange = null;
    clearTimeout(saveTimer); saveTimer = setTimeout(salvar, 1500);
  });

  /* ── Auto-link ao colar URL ── */
  area.addEventListener('paste', e => {
    const texto = (e.clipboardData || window.clipboardData)?.getData('text/plain')?.trim() || '';
    if (!/^https?:\/\/\S{4,}$/i.test(texto)) return;
    e.preventDefault();
    const a = document.createElement('a');
    a.href = texto;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.className = 'ext-link';
    a.contentEditable = 'false';
    a.textContent = texto;
    const sel = window.getSelection();
    if (sel && sel.rangeCount) {
      const rng = sel.getRangeAt(0);
      rng.deleteContents();
      rng.insertNode(a);
      const nr = document.createRange();
      nr.setStartAfter(a); nr.collapse(true);
      sel.removeAllRanges(); sel.addRange(nr);
    }
    clearTimeout(saveTimer); saveTimer = setTimeout(salvar, 1500);
  });

  /* ── Click em link externo ── */
  area.addEventListener('click', e => {
    const a = e.target.closest('a.ext-link, a[href^="http"]');
    if (!a) return;
    e.preventDefault();
    e.stopPropagation();
    window.open(a.href, '_blank', 'noopener,noreferrer');
  });

  /* ── Auto-save ── */
  function salvar() {
    badge.textContent = 'Salvando…';
    badge.className   = 'save-badge saving';
    fetch(saveUrl, {
      method:  'POST',
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify({ conteudo: area.innerHTML })
    })
    .then(r => r.json())
    .then(d => {
      badge.textContent = d.ok ? 'Salvo ✓' : 'Erro';
      badge.className   = d.ok ? 'save-badge saved' : 'save-badge error';
    })
    .catch(() => { badge.textContent = 'Erro'; badge.className = 'save-badge error'; });
  }

  area.addEventListener('input', () => {
    badge.textContent = 'Editando…';
    badge.className   = 'save-badge saving';
    clearTimeout(saveTimer);
    saveTimer = setTimeout(salvar, 1500);
    clearTimeout(acTimer);
    acTimer = setTimeout(checkAC, 180);
  });

  area.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      clearTimeout(saveTimer);
      salvar();
      return;
    }
    if (!popup) return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      acIdx = Math.min(acIdx + 1, acItems.length - 1);
      renderACSel();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      acIdx = Math.max(acIdx - 1, 0);
      renderACSel();
    } else if (e.key === 'Enter' && acIdx >= 0) {
      e.preventDefault();
      selectAC(acItems[acIdx]);
    } else if (e.key === 'Escape') {
      hideAC();
    }
  });

  /* ── Nota link — click (delegated) ── */
  area.addEventListener('click', e => {
    const a = e.target.closest('a.nota-link');
    if (!a) return;
    e.preventDefault();
    const novaTab  = e.ctrlKey || e.metaKey;
    const navegar  = novaTab ? window.novaAba : window.navegarParaNota;
    if (!navegar) return;
    const id   = a.dataset.id ? parseInt(a.dataset.id) : null;
    const nome = a.dataset.nome || '';
    if (id) {
      navegar(id);
    } else if (nome) {
      fetch('/topicos/buscar?q=' + encodeURIComponent(nome))
        .then(r => r.json())
        .then(items => {
          const exact = items.find(i => i.nome.toLowerCase() === nome.toLowerCase());
          const t = exact || items[0];
          if (t) navegar(t.id);
        });
    }
  });

  /* ── Wrap plain #Word patterns in text nodes on load ── */
  function wrapNotaLinks(root) {
    const RE = /#([A-Za-zÀ-ɏ][A-Za-zÀ-ɏ0-9_]*)/g;
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
      acceptNode(n) {
        const p = n.parentElement;
        if (!p || p.closest('a') || p.tagName === 'SCRIPT' || p.tagName === 'STYLE')
          return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    const nodes = [];
    let n;
    while ((n = walker.nextNode())) nodes.push(n);
    nodes.forEach(tn => {
      const txt = tn.textContent;
      RE.lastIndex = 0;
      let m, last = 0;
      const parts = [];
      while ((m = RE.exec(txt))) {
        if (m.index > last) parts.push(document.createTextNode(txt.slice(last, m.index)));
        const a = document.createElement('a');
        a.className = 'nota-link';
        a.dataset.nome = m[1];
        a.textContent = m[0];
        a.href = '#';
        a.contentEditable = 'false';
        parts.push(a);
        last = RE.lastIndex;
      }
      if (!parts.length) return;
      if (last < txt.length) parts.push(document.createTextNode(txt.slice(last)));
      const frag = document.createDocumentFragment();
      parts.forEach(p => frag.appendChild(p));
      tn.parentNode.replaceChild(frag, tn);
    });
  }

  /* ── Autocomplete helpers ── */
  function getHashCtx() {
    const sel = window.getSelection();
    if (!sel || !sel.rangeCount) return null;
    const rng = sel.getRangeAt(0);
    if (!rng.collapsed) return null;
    const node = rng.startContainer;
    if (node.nodeType !== Node.TEXT_NODE || !area.contains(node)) return null;
    const before = node.textContent.slice(0, rng.startOffset);
    const m = before.match(/#\s*([^#\n\r]{0,80})$/);
    if (!m) return null;
    const query = m[1].trim();
    if (!query) return null;
    return { node, start: rng.startOffset - m[0].length, end: rng.startOffset, query, rng };
  }

  function checkAC() {
    const ctx = getHashCtx();
    if (!ctx) { hideAC(); return; }
    fetch('/topicos/buscar?q=' + encodeURIComponent(ctx.query))
      .then(r => r.json())
      .then(items => { if (getHashCtx()) showAC(ctx, items); else hideAC(); })
      .catch(hideAC);
  }

  function showAC(ctx, items) {
    hideAC();
    const rect = ctx.rng.getBoundingClientRect();
    popup = document.createElement('div');
    popup.id = 'notaLinkPopup';
    popup.style.top  = (rect.bottom + 6) + 'px';
    popup.style.left = rect.left + 'px';
    acItems = items;
    acIdx   = items.length ? 0 : -1;
    if (!items.length) {
      popup.innerHTML = '<div class="nlp-empty">Nenhuma nota encontrada</div>';
    } else {
      items.forEach((it, i) => {
        const div = document.createElement('div');
        div.className = 'nlp-item' + (i === 0 ? ' sel' : '');
        div.innerHTML = `<span>${TIPO_ICONE[it.tipo] || '📄'}</span><span>${it.nome}</span>`;
        div.addEventListener('mousedown', e => { e.preventDefault(); selectAC(it); });
        popup.appendChild(div);
      });
      const hint = document.createElement('div');
      hint.className = 'nlp-hint';
      hint.textContent = '↑↓ navegar · Enter selecionar · Esc fechar';
      popup.appendChild(hint);
    }
    document.body.appendChild(popup);
    const pr = popup.getBoundingClientRect();
    if (pr.right  > window.innerWidth)  popup.style.left = (window.innerWidth  - pr.width  - 8) + 'px';
    if (pr.bottom > window.innerHeight) popup.style.top  = (rect.top - pr.height - 6) + 'px';
  }

  function renderACSel() {
    if (!popup) return;
    popup.querySelectorAll('.nlp-item').forEach((el, i) => el.classList.toggle('sel', i === acIdx));
  }

  function hideAC() {
    if (popup) { popup.remove(); popup = null; acItems = []; acIdx = -1; }
  }

  function selectAC(item) {
    const ctx = getHashCtx();
    hideAC();
    if (!ctx) return;
    const rng = document.createRange();
    rng.setStart(ctx.node, ctx.start);
    rng.setEnd(ctx.node, ctx.end);
    rng.deleteContents();
    const a = document.createElement('a');
    a.className = 'nota-link';
    a.dataset.id   = item.id;
    a.dataset.nome = item.nome;
    a.textContent  = '#' + item.nome;
    a.href = '#';
    a.contentEditable = 'false';
    rng.insertNode(a);
    /* Move cursor after the inserted link */
    const sel = window.getSelection();
    const nr  = document.createRange();
    nr.setStartAfter(a);
    nr.collapse(true);
    sel.removeAllRanges();
    sel.addRange(nr);
    clearTimeout(saveTimer);
    saveTimer = setTimeout(salvar, 1500);
  }

  /* Hide popup when cursor leaves the #word token */
  document.addEventListener('selectionchange', () => { if (popup && !getHashCtx()) hideAC(); });
  document.addEventListener('click', e => { if (popup && !popup.contains(e.target)) hideAC(); });

  /* ── Image resize ── */
  const resBox = document.createElement('div');
  resBox.id = 'imgResizeBox';
  resBox.innerHTML =
    '<div class="img-rh" data-h="nw"></div>' +
    '<div class="img-rh" data-h="ne"></div>' +
    '<div class="img-rh" data-h="sw"></div>' +
    '<div class="img-rh" data-h="se"></div>' +
    '<div class="img-rh-lbl" id="imgSizeLbl"></div>';
  document.body.appendChild(resBox);

  const sizeLbl = document.getElementById('imgSizeLbl');
  let selImg = null, dragH = null, dragStart = null;

  function syncBox() {
    if (!selImg) return;
    const r = selImg.getBoundingClientRect();
    resBox.style.left   = r.left   + 'px';
    resBox.style.top    = r.top    + 'px';
    resBox.style.width  = r.width  + 'px';
    resBox.style.height = r.height + 'px';
    sizeLbl.textContent = Math.round(r.width) + ' × ' + Math.round(r.height);
  }

  function selectImage(img) {
    if (selImg) selImg.classList.remove('img-sel');
    selImg = img;
    img.classList.add('img-sel');
    resBox.style.display = 'block';
    syncBox();
  }

  function deselectImage() {
    if (selImg) selImg.classList.remove('img-sel');
    selImg = null;
    resBox.style.display = 'none';
  }

  area.addEventListener('click', e => {
    if (e.target.tagName === 'IMG') { selectImage(e.target); return; }
    if (!resBox.contains(e.target)) deselectImage();
  });

  area.addEventListener('scroll', syncBox);
  window.addEventListener('resize', syncBox);

  resBox.querySelectorAll('.img-rh').forEach(h => {
    h.addEventListener('mousedown', e => {
      e.preventDefault();
      if (!selImg) return;
      dragH = h.dataset.h;
      const r = selImg.getBoundingClientRect();
      dragStart = {
        x: e.clientX, y: e.clientY,
        w: r.width,   h: r.height,
        ratio: selImg.naturalWidth > 0
          ? selImg.naturalWidth / selImg.naturalHeight
          : r.width / r.height
      };
    });
  });

  document.addEventListener('mousemove', e => {
    if (!dragH || !selImg || !dragStart) return;
    const dx = e.clientX - dragStart.x;
    const dy = e.clientY - dragStart.y;
    const hDelta = dragH.includes('e') ? dx : -dx;
    const vDelta = dragH.includes('s') ? dy : -dy;
    const delta  = Math.abs(hDelta) >= Math.abs(vDelta) ? hDelta : vDelta;
    const nw = Math.max(40, dragStart.w + delta);
    selImg.style.width  = nw + 'px';
    selImg.style.height = (nw / dragStart.ratio) + 'px';
    syncBox();
    badge.textContent = 'Editando…';
    badge.className   = 'save-badge saving';
    clearTimeout(saveTimer);
    saveTimer = setTimeout(salvar, 1500);
  });

  document.addEventListener('mouseup', () => { dragH = null; dragStart = null; });

  /* ── Init ── */
  wrapNotaLinks(area);
  area.focus();
}());
</script>
