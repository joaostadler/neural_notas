<div class="doc-wrap">

  <header class="doc-hdr">
    <div class="doc-hdr-left">
      <span class="doc-badge">📔</span>
      <h1 class="doc-titulo">{{ topico.nome }}</h1>
    </div>
    <span class="save-badge" id="saveBadge">—</span>
  </header>

  <div class="toolbar" id="toolbar">
    <button class="tb" data-cmd="bold"              title="Negrito (Ctrl+B)"><b>B</b></button>
    <button class="tb" data-cmd="italic"            title="Itálico (Ctrl+I)"><i>I</i></button>
    <button class="tb" data-cmd="underline"         title="Sublinhado (Ctrl+U)"><u>U</u></button>
    <button class="tb" data-cmd="strikeThrough"     title="Tachado"><s>S</s></button>
    <span class="tb-sep"></span>
    <button class="tb" data-cmd="formatBlock" data-val="h1">H1</button>
    <button class="tb" data-cmd="formatBlock" data-val="h2">H2</button>
    <button class="tb" data-cmd="formatBlock" data-val="h3">H3</button>
    <button class="tb" data-cmd="formatBlock" data-val="p">¶</button>
    <span class="tb-sep"></span>
    <button class="tb" data-cmd="insertUnorderedList">• —</button>
    <button class="tb" data-cmd="insertOrderedList">1. —</button>
    <span class="tb-sep"></span>
    <button class="tb" data-cmd="removeFormat">✕ fmt</button>
  </div>

  <!-- Linhas horizontais estilo caderno -->
  <div class="caderno-area" id="cadArea">
    <div class="editor-area" id="editorArea"
         contenteditable="true"
         data-id="{{ topico.id }}"
         spellcheck="false">
      {% if conteudo and conteudo.conteudo %}
        {{ conteudo.conteudo | safe }}
      {% else %}
        <p><br></p>
      {% endif %}
    </div>
  </div>

</div>

<style>
.doc-wrap{display:flex;flex-direction:column;height:100%;background:#fff;overflow:hidden}
.doc-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 24px 12px;border-bottom:1px solid #e2e8f0;flex-shrink:0;gap:12px}
.doc-hdr-left{display:flex;align-items:baseline;gap:10px;min-width:0}
.doc-badge{font-size:14px;flex-shrink:0}
.doc-titulo{font-size:20px;font-weight:700;color:#0f172a;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.save-badge{font-size:12px;color:#94a3b8;flex-shrink:0;transition:color 0.2s}
.save-badge.saving{color:#f59e0b}
.save-badge.saved{color:#22c55e}
.save-badge.error{color:#ef4444}
.toolbar{display:flex;align-items:center;gap:2px;padding:6px 16px;border-bottom:1px solid #e2e8f0;flex-shrink:0;flex-wrap:wrap;background:#f8fafc}
.tb{display:inline-flex;align-items:center;justify-content:center;min-width:30px;height:26px;padding:0 6px;background:transparent;border:1px solid transparent;border-radius:4px;cursor:pointer;font-size:12px;color:#374151;transition:all 0.1s;font-family:inherit}
.tb:hover{background:#e2e8f0;border-color:#cbd5e1}
.tb-sep{width:1px;height:18px;background:#e2e8f0;margin:0 4px}

/* Linhas estilo caderno */
.caderno-area{flex:1;overflow-y:auto;min-height:0;background:repeating-linear-gradient(transparent,transparent 27px,#dbeafe 27px,#dbeafe 28px);background-attachment:local;padding:0}
.editor-area{min-height:100%;padding:28px 48px;font-size:15px;line-height:28px;color:#1e293b;outline:none}
.editor-area:focus{outline:none}
.editor-area h1{font-size:24px;font-weight:700;line-height:56px;color:#0f172a;margin:0}
.editor-area h2{font-size:19px;font-weight:600;line-height:28px;color:#1e293b;margin:0}
.editor-area h3{font-size:16px;font-weight:600;line-height:28px;color:#374151;margin:0}
.editor-area p{margin:0;line-height:28px}
.editor-area ul,.editor-area ol{padding-left:26px;margin:0}
.editor-area li{line-height:28px}
@media(max-width:640px){.editor-area{padding:16px 18px}}
</style>

<script>
(function(){
  const area    = document.getElementById('editorArea');
  const badge   = document.getElementById('saveBadge');
  const toolbar = document.getElementById('toolbar');
  if (!area) return;

  const saveUrl = '/topico/' + area.dataset.id + '/salvar';
  let timer;

  toolbar.querySelectorAll('.tb').forEach(btn => {
    btn.addEventListener('mousedown', e => {
      e.preventDefault();
      document.execCommand(btn.dataset.cmd, false, btn.dataset.val || null);
      area.focus();
    });
  });

  function salvar() {
    badge.textContent = 'Salvando…';
    badge.className   = 'save-badge saving';
    fetch(saveUrl, {
      method:  'POST',
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify({ conteudo: area.innerHTML })
    })
    .then(r => r.json())
    .then(d => {
      badge.textContent = d.ok ? 'Salvo ✓' : 'Erro';
      badge.className   = d.ok ? 'save-badge saved' : 'save-badge error';
    })
    .catch(() => { badge.textContent = 'Erro'; badge.className = 'save-badge error'; });
  }

  area.addEventListener('input', () => {
    badge.textContent = 'Editando…';
    badge.className   = 'save-badge saving';
    clearTimeout(timer);
    timer = setTimeout(salvar, 1500);
  });

  area.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      clearTimeout(timer);
      salvar();
    }
  });

  area.focus();
}());
</script>
