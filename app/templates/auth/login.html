{% extends "base.html" %}

{% block title %}Login - NeuralNotes{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h1 class="auth-title">🧠 NeuralNotes</h1>
        <p class="auth-subtitle">Sua workspace de conhecimento</p>

        <div class="auth-tabs">
            <button class="tab-btn active" data-tab="login">Login</button>
            <button class="tab-btn" data-tab="register"><a href="{{ url_for('auth.register') }}" style="text-decoration: none; color: inherit;">Cadastro</a></button>
        </div>

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="usuario">Usuário</label>
                <input type="text" id="usuario" name="usuario" placeholder="seu_usuario" required autofocus>
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="••••••••" required>
            </div>

            <div class="form-check">
                <input type="checkbox" id="lembrar" name="lembrar" value="on">
                <label for="lembrar">Lembrar-me</label>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Entrar</button>
        </form>

        <p class="auth-footer">
            Não tem conta? <a href="{{ url_for('auth.register') }}">Cadastre-se aqui</a>
        </p>

    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
.auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

.auth-box {
    background: white;
    border-radius: 12px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
}

.auth-title {
    font-size: 28px;
    font-weight: bold;
    text-align: center;
    margin: 0 0 8px;
    color: #2563eb;
}

.auth-subtitle {
    font-size: 14px;
    text-align: center;
    color: #64748b;
    margin: 0 0 24px;
}

.auth-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
}

.tab-btn {
    flex: 1;
    padding: 10px;
    border: none;
    background: #f1f5f9;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.2s;
}

.tab-btn.active {
    background: #2563eb;
    color: white;
}

.form-group {
    margin-bottom: 16px;
}

.form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #64748b;
    margin-bottom: 6px;
}

.form-group input {
    width: 100%;
    padding: 10px;
    border: 1px solid #dbe4ef;
    border-radius: 8px;
    font-size: 14px;
    transition: border-color 0.2s;
}

.form-group input:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

.form-check {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    font-size: 14px;
}

.form-check input[type="checkbox"] {
    width: auto;
}

.auth-footer {
    text-align: center;
    font-size: 14px;
    color: #64748b;
    margin-top: 16px;
}

.auth-footer a {
    color: #2563eb;
    text-decoration: none;
    font-weight: 600;
}

.auth-footer a:hover {
    text-decoration: underline;
}

</style>
{% endblock %}
